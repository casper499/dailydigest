<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f7;
      --surface: #ffffff;
      --border: #e9e9e9;
      --text: #111111;
      --muted: #999999;
      --faint: #bbbbbb;
      --green: #16a34a;
      --red: #dc2626;
      --yt: #ff0000;
      --ig: #c13584;
      --tt: #111111;
      --cal: #6366f1;
      --whop: #16a34a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 36px 40px 0;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    #updated {
      font-size: 12px;
      color: var(--muted);
    }

    .section {
      padding: 28px 40px 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--faint);
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 16px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .metrics {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .metric-val {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .metric-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .metric-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .delta {
      font-size: 11px;
      font-weight: 500;
      color: var(--green);
    }

    .delta.neg { color: var(--red); }
    .delta.neutral { color: var(--faint); }

    .pending {
      font-size: 13px;
      color: var(--faint);
      padding: 4px 0;
    }

    .refresh {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.15s;
    }

    .refresh:hover { opacity: 0.75; }
    .refresh:disabled { opacity: 0.4; cursor: default; }

    @media (max-width: 600px) {
      header, .section { padding-left: 20px; padding-right: 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Daily Digest</h1>
  <span id="updated">—</span>
</header>

<div class="section">
  <div class="section-label">Social</div>
  <div class="grid" id="social"></div>
</div>

<div class="section" style="padding-bottom: 80px;">
  <div class="section-label">Business</div>
  <div class="grid" id="business"></div>
</div>

<button class="refresh" id="refresh-btn" onclick="load()">Refresh</button>

<script>
  function fmt(n) {
    if (n == null || n === undefined) return '—';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 10000) return (n / 1000).toFixed(1) + 'K';
    return Number(n).toLocaleString('en');
  }

  function money(n) {
    if (n == null) return '—';
    return '$' + Number(n).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function deltaTag(n) {
    if (n == null) return '';
    const cls = n > 0 ? 'delta' : n < 0 ? 'delta neg' : 'delta neutral';
    const sign = n > 0 ? '+' : '';
    return `<span class="${cls}">${sign}${fmt(n)}/mo</span>`;
  }

  function card(title, dotColor, rows) {
    const metrics = rows.map(r => `
      <div>
        <div class="metric-row">
          <span class="metric-val">${r.value}</span>
          ${r.delta ? deltaTag(r.delta) : ''}
        </div>
        <div class="metric-label">${r.label}</div>
      </div>
    `).join('');
    return `
      <div class="card">
        <div class="card-header">
          <span class="dot" style="background:${dotColor}"></span>
          <span class="card-title">${title}</span>
        </div>
        <div class="metrics">${metrics}</div>
      </div>
    `;
  }

  function pendingCard(title, dotColor, note) {
    return `
      <div class="card">
        <div class="card-header">
          <span class="dot" style="background:${dotColor}"></span>
          <span class="card-title">${title}</span>
        </div>
        <div class="pending">${note}</div>
      </div>
    `;
  }

  async function load() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = 'Loading...';
    document.getElementById('updated').textContent = '—';

    try {
      const res = await fetch('/api/data');
      const d = await res.json();

      const ts = new Date(d.updated_at);
      document.getElementById('updated').textContent =
        'Updated ' + ts.toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });

      let social = '';
      let business = '';

      // YouTube
      const yt = d.youtube || {};
      if (!yt.error) {
        social += card('YouTube', '#ff0000', [
          { value: fmt(yt.subscribers), label: 'Subscribers', delta: yt.delta_subscribers },
          { value: fmt(yt.total_views), label: 'Total views', delta: yt.delta_views },
          { value: yt.videos, label: 'Videos' },
        ]);
      } else {
        social += pendingCard('YouTube', '#ff0000', yt.error);
      }

      // Instagram main
      const igm = d.instagram_main;
      if (igm && !igm.error) {
        const igmRows = [
          { value: fmt(igm.followers), label: 'Followers', delta: igm.delta_followers },
        ];
        if (igm.monthly_views != null) igmRows.push({ value: fmt(igm.monthly_views), label: 'Monthly views' });
        if (igm.monthly_reach != null) igmRows.push({ value: fmt(igm.monthly_reach), label: 'Monthly reach' });
        if (igm.interactions != null) igmRows.push({ value: fmt(igm.interactions), label: 'Interactions' });
        if (igm.profile_visits != null) igmRows.push({ value: fmt(igm.profile_visits), label: 'Profile visits' });
        social += card(`Instagram @${igm.username}`, '#c13584', igmRows);
      } else {
        social += pendingCard('Instagram @casperrverbeek', '#c13584', 'Loading...');
      }

      // Instagram second
      const igs = d.instagram_second;
      if (igs && !igs.error) {
        const igsRows = [
          { value: fmt(igs.followers), label: 'Followers', delta: igs.delta_followers },
        ];
        if (igs.monthly_views != null) igsRows.push({ value: fmt(igs.monthly_views), label: 'Monthly views' });
        if (igs.monthly_reach != null) igsRows.push({ value: fmt(igs.monthly_reach), label: 'Monthly reach' });
        if (igs.interactions != null) igsRows.push({ value: fmt(igs.interactions), label: 'Interactions' });
        social += card(`Instagram @${igs.username}`, '#c13584', igsRows);
      } else {
        social += pendingCard('Instagram @casprvrbk', '#c13584', 'Loading...');
      }

      // TikTok
      const tt = d.tiktok || {};
      if (tt.followers != null) {
        social += card(`TikTok @${tt.username}`, '#111111', [
          { value: fmt(tt.followers), label: 'Followers', delta: tt.delta_followers },
          { value: fmt(tt.likes), label: 'Total likes' },
          { value: tt.videos, label: 'Videos' },
        ]);
      } else {
        social += pendingCard('TikTok @casprvrbk', '#111111', tt.error || 'Could not load');
      }

      document.getElementById('social').innerHTML = social;

      // Cal.com
      const cal = d.calcom || {};
      if (!cal.error) {
        business += card('Cal.com', '#6366f1', [
          { value: cal.today, label: 'Calls today' },
          { value: cal.this_week, label: 'This week' },
          { value: cal.this_month, label: 'This month' },
        ]);
      }

      // Whop
      const whop = d.whop || {};
      if (!whop.error) {
        business += card('Whop', '#16a34a', [
          { value: money(whop.revenue_today), label: 'Today' },
          { value: money(whop.revenue_month), label: 'This month' },
          { value: money(whop.revenue_30d), label: 'Last 30 days' },
          { value: whop.active_members, label: 'Active members' },
        ]);
      }

      document.getElementById('business').innerHTML = business;

    } catch (e) {
      document.getElementById('updated').textContent = 'Error loading data';
    }

    btn.disabled = false;
    btn.textContent = 'Refresh';
  }

  load();
</script>
</body>
</html>
