<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Casper · Digest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f5;
      --surface: #fff;
      --border: #e8e8e8;
      --text: #111;
      --muted: #888;
      --faint: #bbb;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 20px 100px; }

    /* Header */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    header h1 { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.02em; }
    #updated { font-size: 11px; color: var(--faint); }

    /* Section labels */
    .sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); margin: 24px 0 10px; }

    /* Grids */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    @media(max-width:720px){ .g2,.g3{ grid-template-columns:1fr; } }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; }
    .card.hero { padding: 26px 26px 22px; }
    .tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }

    /* Big numbers */
    .big { font-size: 38px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; }
    .med { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .sm  { font-size: 13px; font-weight: 600; }
    .xs  { font-size: 11px; color: var(--muted); }

    /* Stat row */
    .stat-row { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
    .stat { }
    .stat-val { font-size: 15px; font-weight: 600; }
    .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; }

    /* Progress */
    .prog { margin-top: 14px; }
    .prog-head { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .prog-lbl { font-size: 11px; color: var(--muted); }
    .prog-pct { font-size: 11px; font-weight: 700; }
    .track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 10px; }
    .fill  { height: 100%; border-radius: 99px; background: var(--text); transition: width .6s; }
    .fill.g { background: var(--green); }
    .fill.a { background: var(--amber); }

    /* Inline bar rows (social) */
    .ip { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .ip-lbl { font-size: 12px; min-width: 110px; }
    .ip-t { flex:1; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .ip-f { height: 100%; border-radius: 99px; background: var(--text); }
    .ip-p { font-size: 11px; color: var(--muted); min-width: 32px; text-align: right; }

    /* Delta badges */
    .up   { color: var(--green); font-size: 11px; font-weight: 600; margin-left: 5px; }
    .down { color: var(--red);   font-size: 11px; font-weight: 600; margin-left: 5px; }

    /* Video rank badge */
    .rank { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; background: #111; color: #fff; margin-left: 8px; }
    .rank.top { background: var(--green); }
    .rank.mid { background: var(--amber); }
    .rank.low { background: var(--red); }

    /* Platform divider */
    .plat-row { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
    .plat-row:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }

    /* Calendar */
    .cal-g { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-top: 10px; }
    .cal-col { text-align: center; }
    .cal-name { font-size: 9px; color: var(--faint); text-transform: uppercase; }
    .cal-dot { width: 26px; height: 26px; border-radius: 50%; margin: 3px auto 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--muted); background: var(--bg); }
    .cal-dot.on { background: var(--text); color: #fff; }
    .cal-dot.today { outline: 2px solid var(--text); outline-offset: 2px; }

    /* Pending */
    .pend { color: var(--faint); font-size: 12px; padding: 4px 0; }

    /* Fixed refresh */
    .refresh { position: fixed; bottom: 22px; right: 22px; background: var(--text); color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .refresh:hover { opacity: .75; }
    .refresh:disabled { opacity: .4; cursor: default; }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Casper · Daily Digest</h1>
    <span id="updated">—</span>
  </header>

  <div class="sec">🎯 Casper Main Channel</div>
  <div id="s-hero"></div>

  <div class="sec">Personal</div>
  <div class="g2" id="s-personal-top" style="margin-bottom:10px"></div>
  <div id="s-personal-social"></div>

  <div class="sec">Clients</div>
  <div class="g2" id="s-clients"></div>

</div>
<button class="refresh" id="rb" onclick="load()">Refresh</button>

<script>
function fmt(n,digits=1){
  if(n==null)return'—';
  if(n>=1e6)return(n/1e6).toFixed(digits)+'M';
  if(n>=1e4)return(n/1e3).toFixed(digits)+'K';
  return Number(n).toLocaleString('en');
}
function money(n){
  if(n==null)return'—';
  return'$'+Number(n).toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function pct(v,g){ return g?Math.min(Math.round(v/g*1000)/10,100):0; }
function barCls(p){ return p>=75?'g':p>=30?'':' a'; }
function bar(v,g,lbl){
  const p=pct(v,g);
  return`<div class="prog">
    <div class="prog-head"><span class="prog-lbl">${lbl??fmt(v)+' / '+fmt(g)}</span><span class="prog-pct">${p}%</span></div>
    <div class="track"><div class="fill${barCls(p)}" style="width:${p}%"></div></div>
  </div>`;
}
function delt(n,suffix=''){
  if(n==null)return'';
  const s=n>=0?'+':'';
  const cls=n>=0?'up':'down';
  return`<span class="${cls}">${s}${fmt(n)}${suffix}</span>`;
}
function rankBadge(r){
  if(!r)return'';
  const n=parseInt(r.split(' ')[0]);
  const cls=n<=3?'top':n<=6?'mid':'low';
  return`<span class="rank ${cls}">🏆 ${r}</span>`;
}

// ── Hero ──────────────────────────────────────────────────────────────────────
function renderHero(yt, goals){
  if(!yt||yt.error){ document.getElementById('s-hero').innerHTML='<div class="card hero"><div class="pend">YouTube data unavailable</div></div>'; return; }
  const subG=goals.yt_personal_subs||10000;
  const viewG=500000;
  const ds = yt.delta_subscribers;
  const dv = yt.delta_views;
  document.getElementById('s-hero').innerHTML=`
    <div class="card hero">
      <div class="tag">📺 Casper Main Channel · @casperverbeek</div>
      <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">
        <span class="big">${fmt(yt.subscribers,0)}</span>
        <span class="xs">subscribers</span>
        ${delt(ds,' this month')}
      </div>
      <div class="stat-row">
        <div class="stat"><div class="stat-val">${fmt(yt.total_views)}</div><div class="stat-lbl">total views</div></div>
        <div class="stat"><div class="stat-val">${yt.videos}</div><div class="stat-lbl">videos</div></div>
        ${ds!=null?`<div class="stat"><div class="stat-val">${delt(ds)}</div><div class="stat-lbl">subs this month</div></div>`:''}
      </div>
      ${bar(yt.subscribers, subG, `${fmt(yt.subscribers,0)} / ${fmt(subG,0)} subscribers`)}
      ${bar(yt.total_views, viewG, `${fmt(yt.total_views)} / ${fmt(viewG)} total views`)}
    </div>`;
}

// ── Revenue ───────────────────────────────────────────────────────────────────
function revenueCard(whop, goals){
  if(!whop)return'<div class="card"><div class="pend">Revenue unavailable</div></div>';
  const rev=whop.revenue_month??0, cut=whop.personal_cut??0;
  return`<div class="card">
    <div class="tag">💰 Revenue</div>
    <div class="med">${money(rev)}</div>
    <div class="xs" style="margin-top:4px">Your cut <strong style="color:#111">${money(cut)}</strong> · ${whop.active_members??'—'} members</div>
    ${bar(rev, goals.whop_revenue_month||10000, `${money(rev)} of ${money(goals.whop_revenue_month)} goal`)}
    <div class="xs" style="margin-top:8px">Today: ${money(whop.revenue_today)}</div>
  </div>`;
}

// ── Short Form ────────────────────────────────────────────────────────────────
function platRow(emoji, handle, data, followerGoal){
  if(!data)return`<div class="plat-row"><span class="tag">${emoji} ${handle}</span><div class="pend">No data</div></div>`;
  const f=data.followers??0, p=pct(f,followerGoal);
  const views=data.monthly_views??data.monthly_impressions;
  return`<div class="plat-row">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <span class="tag" style="margin-bottom:0">${emoji} ${handle}</span>
      <span class="xs">${data.posts!=null?data.posts+' posts':''}</span>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div class="stat"><div class="stat-val">${fmt(f,0)}</div><div class="stat-lbl">followers ${delt(data.delta_followers)}</div></div>
      ${views!=null?`<div class="stat"><div class="stat-val">${fmt(views)}</div><div class="stat-lbl">views/mo</div></div>`:''}
      ${data.monthly_reach!=null?`<div class="stat"><div class="stat-val">${fmt(data.monthly_reach)}</div><div class="stat-lbl">reach/mo</div></div>`:''}
      ${data.interactions!=null?`<div class="stat"><div class="stat-val">${fmt(data.interactions)}</div><div class="stat-lbl">interactions</div></div>`:''}
    </div>
    <div class="ip" style="margin-top:10px">
      <span class="ip-lbl" style="font-size:11px;color:var(--muted)">${fmt(f,0)} → ${fmt(followerGoal)}</span>
      <div class="ip-t"><div class="ip-f" style="width:${p}%"></div></div>
      <span class="ip-p">${p}%</span>
    </div>
  </div>`;
}

function shortFormCard(igm, igs, tt, goals){
  return`<div class="card" style="grid-column:span 2">
    <div class="tag">📱 Short Form — 10K Followers Each</div>
    <div class="g3" style="gap:16px">
      <div>${platRow('📸','@casperrverbeek',igm,goals.ig_main_followers||10000)}</div>
      <div>${platRow('📸','@casprvrbk',igs,goals.ig_second_followers||10000)}</div>
      <div>${platRow('🎵','@casprvrbk (TT)',tt,goals.tt_followers||10000)}</div>
    </div>
  </div>`;
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function calCard(cal){
  const days=cal?.week_days??[];
  const dots=days.map(d=>`
    <div class="cal-col">
      <div class="cal-name">${d.day}</div>
      <div class="cal-dot ${d.count>0?'on':''} ${d.is_today?'today':''}">${d.count>0?d.count:d.date}</div>
    </div>`).join('');
  return`<div class="card">
    <div class="tag">📅 Calls</div>
    <div style="display:flex;gap:16px;align-items:baseline;flex-wrap:wrap">
      <div class="stat"><div class="stat-val">${cal?.today??0}</div><div class="stat-lbl">today</div></div>
      <div class="stat"><div class="stat-val">${cal?.this_week??0}</div><div class="stat-lbl">this week</div></div>
      <div class="stat"><div class="stat-val">${cal?.this_month??0}</div><div class="stat-lbl">this month</div></div>
    </div>
    <div class="cal-g">${dots}</div>
  </div>`;
}

// ── Client channel card ───────────────────────────────────────────────────────
function clientCard(emoji, name, handle, yt, studio, subGoal, viewGoal){
  if(!yt){
    return`<div class="card">
      <div class="tag">${emoji} ${name}</div>
      <div class="pend">Channel pending setup</div>
    </div>`;
  }
  if(yt.error){ return`<div class="card"><div class="tag">${emoji} ${name}</div><div class="pend">${yt.error}</div></div>`; }

  const subs28=studio?.[`${handle}_subs_gained_28d`];
  const views28=yt.monthly_views ?? studio?.[`${handle}_views_28d`];
  const title=studio?.[`${handle}_latest_title`];
  const vviews=studio?.[`${handle}_latest_views`];
  const rank=studio?.[`${handle}_latest_rank`];
  const ctr=studio?.[`${handle}_latest_ctr`];
  const dur=studio?.[`${handle}_latest_duration`];

  return`<div class="card">
    <div class="tag">${emoji} ${name} <span style="font-weight:400;color:var(--faint)">@${handle}</span></div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div class="stat">
        <div class="stat-val">${fmt(yt.subscribers,0)} <span style="font-size:12px;font-weight:400;color:var(--muted)">${subs28!=null?delt(subs28,' /28d'):''}</span></div>
        <div class="stat-lbl">subscribers</div>
      </div>
      ${views28!=null?`<div class="stat"><div class="stat-val">${fmt(views28)}</div><div class="stat-lbl">views last 28 days</div></div>`:''}
      <div class="stat"><div class="stat-val">${yt.videos}</div><div class="stat-lbl">videos</div></div>
    </div>
    ${bar(yt.subscribers, subGoal, `${fmt(yt.subscribers,0)} / ${fmt(subGoal)} subs`)}
    ${views28!=null?bar(views28, viewGoal, `${fmt(views28)} / ${fmt(viewGoal)} views/mo`):''}
    ${title?`
    <div style="border-top:1px solid var(--border);margin-top:14px;padding-top:12px">
      <div class="xs" style="margin-bottom:4px">Latest video ${rankBadge(rank)}</div>
      <div style="font-size:12px;font-weight:500;line-height:1.4">${title}</div>
      <div class="stat-row" style="margin-top:8px">
        ${vviews!=null?`<div class="stat"><div class="stat-val">${fmt(vviews,0)}</div><div class="stat-lbl">views</div></div>`:''}
        ${ctr!=null?`<div class="stat"><div class="stat-val">${ctr}%</div><div class="stat-lbl">CTR</div></div>`:''}
        ${dur?`<div class="stat"><div class="stat-val">${dur}</div><div class="stat-lbl">avg duration</div></div>`:''}
      </div>
    </div>`:''}
  </div>`;
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function load(){
  const btn=document.getElementById('rb');
  btn.disabled=true; btn.textContent='Loading...';
  try{
    const d=await(await fetch('/api/data')).json();
    const goals=d.goals||{};
    const studio=d.studio||{};

    document.getElementById('updated').textContent=
      'Updated '+new Date(d.updated_at).toLocaleString('en-GB',{dateStyle:'medium',timeStyle:'short'});

    renderHero(d.youtube_personal, goals);

    document.getElementById('s-personal-top').innerHTML=
      revenueCard(d.whop, goals)+
      calCard(d.calcom);

    document.getElementById('s-personal-social').innerHTML=
      shortFormCard(d.instagram_main, d.instagram_second, d.tiktok, goals);

    // Clients
    document.getElementById('s-clients').innerHTML=
      clientCard('🎬','MakeUGC','makeugc', d.youtube_makeugc, studio, goals.yt_makeugc_subs, goals.yt_makeugc_views_month)+
      clientCard('🚀','Pagepilot','pagepilot', d.youtube_pagepilot, studio, goals.yt_pagepilot_subs, goals.yt_pagepilot_views_month);

  }catch(e){
    document.getElementById('updated').textContent='Error — '+e.message;
  }
  btn.disabled=false; btn.textContent='Refresh';
}
load();
</script>
</body>
</html>
